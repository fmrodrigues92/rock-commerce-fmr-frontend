version: "3.9"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rock-commerce-frontend
    ports:
      - "${APP_PORT}:${APP_PORT}"
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      APP_PORT: "${APP_PORT}"
      VITE_API_URL: "${VITE_API_URL}"
    restart: unless-stopped